/* iOS ne déclenche pas toujours le sélecteur de fichier natif via un clic JS

<script>
/* Filet de secours de diagnostic : affiche toute erreur JS directement sur la
   page (utile sur iPad où la console n'est pas accessible facilement).
   Syntaxe volontairement très basique pour rester compatible partout. */
window.onerror = function(msg, url, line, col){
  var banner = document.createElement('div');
  banner.setAttribute('style', 'position:fixed;top:0;left:0;right:0;background:#dc2626;color:#fff;padding:12px;font-size:13px;z-index:99999;font-family:monospace;white-space:pre-wrap;');
  banner.textContent = 'ERREUR JS : ' + msg + ' (ligne ' + line + ', colonne ' + col + ')';
  document.body.appendChild(banner);
  return false;
};
</script>

  <div class="header-actions">

    </label>

<script>
'use strict';

/* ==================== CONSTANTES ==================== */
const STORAGE_KEY = 'epsJoliotCurieData_v1';
const LEVEL_LABEL = {A:'A besoins', F:'Fragile', S:'Satisfaisant'};
const HEADER_COLORS = ['var(--col1)','var(--col2)','var(--col3)','var(--col4)','var(--col5)','var(--col6)','var(--col7)','var(--col8)'];
const AVAILABLE_CLASSES = ['6ème1', '6ème2', '6ème3', '6ème4'];

/* ==================== ETAT ==================== */
let state = {
  classes: {},      // { className: { students:[...], selectedTest:null, leger:{...}, vitesse:{...}, longueur:{...} } }
  classOrder: [],
  activeTab: 'general' // 'general' | 'results' | className
};

let sortState = { col: 'nomPrenom', dir: 1 };
let resultsClassFilter = 'all';
let vitesseTimerHandle = null;
let legerTimerHandle = null;

/* ==================== PERSISTENCE ==================== */
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){ console.warn('Sauvegarde impossible', e); }
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && parsed.classes) state = parsed;
    }
  }catch(e){ console.warn('Chargement impossible', e); }
}

/* ==================== UTILITAIRES ==================== */
function normalize(str){
  return (str||'').toString().normalize('NFD').replace(new RegExp('[\\u0300-\\u036f]','g'),'').toLowerCase().trim();
}
function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }

function sortStudentsAlpha(students){
  return [...students].sort((a,b)=>{
    const an = normalize(a.nom)+normalize(a.prenom);
    const bn = normalize(b.nom)+normalize(b.prenom);
    return an.localeCompare(bn);
  });
}

function fmtMMSS(totalSeconds){
  const m = Math.floor(totalSeconds/60);
  const s = Math.floor(totalSeconds%60);
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

/* ---- Barèmes ---- */
function niveauLeger(palier){
  if(palier<=1) return 'A';
  if(palier<=3) return 'F';
  return 'S';
}
function niveauLongueur(cm){
  if(cm<=110) return 'A';
  if(cm<=140) return 'F';
  return 'S';
}
function niveauVitesse(sec){
  if(sec>=6.8) return 'A';
  if(sec>=6) return 'F';
  return 'S';
}

/* ---- Calcul palier Luc Léger ----
   Echauffement : 0-120s à 8 km/h (compte comme palier 0)
   Puis palier n (n>=1) : 60s, vitesse = 8 + n*0.5
   Règle : le palier/la vitesse comptés sont ceux du segment en cours
   si l'élève a couru plus de la moitié du segment, sinon on redescend
   d'un palier (0.5 km/h de moins). */
function getLegerSegment(elapsedSec){
  if(elapsedSec < 120){
    return {palier:0, start:0, end:120, vitesse:8};
  }
  const n = Math.floor((elapsedSec-120)/60)+1;
  const start = 120 + (n-1)*60;
  const end = start+60;
  return {palier:n, start, end, vitesse: 8 + n*0.5};
}
function computeLegerResult(elapsedSec){
  const seg = getLegerSegment(Math.max(0,elapsedSec));
  const fraction = (elapsedSec - seg.start) / (seg.end - seg.start);
  if(fraction >= 0.5 || seg.palier === 0){
    return {palier: seg.palier, vitesse: seg.vitesse};
  }
  return {palier: seg.palier-1, vitesse: seg.vitesse-0.5};
}

/* ==================== GESTION CLASSES / ELEVES ==================== */
function ensureClass(name){
  if(!state.classes[name]){
    state.classes[name] = {
      students: [],
      selectedTest: null,
      leger: {startingGroup:'A', activeGroup:null, running:false, startTime:null, elapsedFrozen:0},
      vitesse: {running:false, startTime:null, selectedId:null},
      longueur: {selectedId:null}
    };
    state.classOrder.push(name);
  }
  return state.classes[name];
}

function allStudentsFlat(){
  let arr = [];
  state.classOrder.forEach(cn=>{
    state.classes[cn].students.forEach(s=> arr.push(s));
  });
  return arr;
}

/* ==================== IMPORT EXCEL / GOOGLE SHEET ====================
   Le fichier importé contient l'ensemble des élèves du collège.
   On filtre, à chaque import, uniquement les élèves de la classe visée
   (colonne "Classe" si présente, sinon nom de l'onglet du classeur). */
function normalizeClasseKey(s){
  return normalize(s).replace(/[^a-z0-9]/g,'');
}

function handleClassImportFile(e, className){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    try{
      const data = new Uint8Array(evt.target.result);
      const workbook = XLSX.read(data, {type:'array'});
      let allRows = [];
      workbook.SheetNames.forEach(sheetName=>{
        const sheet = workbook.Sheets[sheetName];
        XLSX.utils.sheet_to_json(sheet, {defval:''}).forEach(row=> allRows.push({row, sheetName}));
      });
      if(!allRows.length){
        alert('Le fichier est vide.');
        e.target.value=''; return;
      }
      const keys = Object.keys(allRows[0].row);
      const keyNom = keys.find(k=> normalize(k).includes('nom') && !normalize(k).includes('prenom'));
      const keyPrenom = keys.find(k=> normalize(k).includes('prenom'));
      const keySexe = keys.find(k=> normalize(k).includes('sexe') || normalize(k).includes('genre'));
      const keyClasse = keys.find(k=> normalize(k).includes('classe'));
      if(!keyNom && !keyPrenom){
        alert("Colonnes 'Nom' et 'Prénom' introuvables dans le fichier.");
        e.target.value=''; return;
      }

      const targetKey = normalizeClasseKey(className);
      const matched = [];
      allRows.forEach(({row, sheetName})=>{
        const nom = (row[keyNom]||'').toString().trim();
        const prenom = (row[keyPrenom]||'').toString().trim();
        if(!nom && !prenom) return;
        const classeVal = keyClasse ? (row[keyClasse]||'').toString().trim() : sheetName;
        if(normalizeClasseKey(classeVal) !== targetKey) return;
        const sexeRaw = normalize(row[keySexe]||'');
        const sexe = sexeRaw.startsWith('f') ? 'F' : 'G';
        matched.push({
          id: uid('el'),
          nom, prenom, classe: className, sexe,
          groupe: null,
          results: {}
        });
      });

      if(!matched.length){
        alert(`Aucun élève trouvé pour la classe "${className}" dans ce fichier. Vérifiez la colonne Classe (valeur attendue proche de "${className}").`);
        e.target.value=''; return;
      }

      const cls = ensureClass(className);
      cls.students = sortStudentsAlpha(matched);
      const half = Math.ceil(cls.students.length/2);
      cls.students.forEach((s,i)=> s.groupe = i < half ? 'A' : 'B');

      state.activeTab = className;
      saveState();
      renderAll();
      alert(`Import réussi : ${matched.length} élève(s) importé(s) pour ${className}.`);
    }catch(err){
      console.error(err);
      alert("Erreur lors de la lecture du fichier : "+err.message);
    }
    e.target.value = '';
  };
  reader.readAsArrayBuffer(file);
}

/* Import global (en-tête) : choix de la classe puis du fichier */
let pendingImportClass = null;
document.getElementById('btnImportClass').addEventListener('click', ()=>{
  pendingImportClass = document.getElementById('importClassSelect').value;
  document.getElementById('fileImportClass').click();
});
document.getElementById('fileImportClass').addEventListener('change', (e)=>{
  handleClassImportFile(e, pendingImportClass);
});

/* ==================== EXPORT EXCEL ==================== */
document.getElementById('btnExport').addEventListener('click', exportResults);
function exportResults(){
  const wb = XLSX.utils.book_new();
  const rows = [['Nom Prénom','Classe','Sexe',
    'Léger - Palier','Léger - Vitesse (km/h)','Léger - Temps','Léger - Niveau',
    'Longueur - Distance (cm)','Longueur - Niveau',
    'Vitesse - Temps (s)','Vitesse - Niveau']];

  allStudentsFlat().forEach(s=>{
    const l = s.results.leger, j = s.results.longueur, v = s.results.vitesse;
    rows.push([
      fullName(s), s.classe, s.sexe==='F'?'Fille':'Garçon',
      l ? (l.absent?'Absent':l.palier) : '',
      l && !l.absent ? l.vitesse : '',
      l && !l.absent ? fmtMMSS(l.temps) : '',
      l ? (l.absent?'Absent':LEVEL_LABEL[niveauLeger(l.palier)]) : '',
      j ? (j.absent?'Absent':j.distance) : '',
      j ? (j.absent?'Absent':LEVEL_LABEL[niveauLongueur(j.distance)]) : '',
      v ? (v.absent?'Absent':v.temps.toFixed(2)) : '',
      v ? (v.absent?'Absent':LEVEL_LABEL[niveauVitesse(v.temps)]) : ''
    ]);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, 'Résultats');

  state.classOrder.forEach(cn=>{
    const cls = state.classes[cn];
    const r2 = [['Nom Prénom','Sexe','Groupe']];
    sortStudentsAlpha(cls.students).forEach(s=> r2.push([fullName(s), s.sexe==='F'?'Fille':'Garçon', s.groupe||'']));
    const ws2 = XLSX.utils.aoa_to_sheet(r2);
    XLSX.utils.book_append_sheet(wb, ws2, cn.substring(0,31));
  });

  XLSX.writeFile(wb, 'Resultats_Tests_Physiques_6eme.xlsx');
}

/* ==================== RESET ==================== */
document.getElementById('btnReset').addEventListener('click', ()=>{
  if(confirm('Cette action supprimera toutes les classes et tous les résultats enregistrés dans ce navigateur. Continuer ?')){
    localStorage.removeItem(STORAGE_KEY);
    state = {classes:{}, classOrder:[], activeTab:'general'};
    renderAll();
  }
});

/* ==================== RENDU : NAVIGATION ==================== */
function renderTabs(){
  const nav = document.getElementById('tabsNav');
  let html = `<button data-tab="general" class="${state.activeTab==='general'?'active':''}">🏠 Général</button>`;
  state.classOrder.forEach(cn=>{
    html += `<button data-tab="${escapeAttr(cn)}" class="${state.activeTab===cn?'active':''}">🏷️ ${escapeHtml(cn)}</button>`;
  });
  if(state.classOrder.length){
    html += `<button data-tab="results" class="tab-results ${state.activeTab==='results'?'active':''}">📊 Résultats</button>`;
  }
  nav.innerHTML = html;
  nav.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.activeTab = btn.dataset.tab;
      saveState();
      renderAll();
    });
  });
}

function escapeHtml(s){
  return (s===undefined||s===null?'':s.toString()).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }
function fullName(s){ return `${s.nom} ${s.prenom}`.trim(); }

/* ==================== RENDU PRINCIPAL ==================== */
function renderAll(){
  renderTabs();
  const main = document.getElementById('mainContent');
  if(state.activeTab === 'general') main.innerHTML = renderGeneralTab();
  else if(state.activeTab === 'results') main.innerHTML = renderResultsTab();
  else main.innerHTML = renderClassTab(state.activeTab);
  attachDynamicHandlers();
}

/* ---- Onglet Général : 5 colonnes ---- */
function renderGeneralTab(){
  const students = sortStudentsAlpha(allStudentsFlat());
  if(!students.length){
    return `<div class="card"><div class="empty-state">

/* ==================== TEST LUC LEGER ==================== */
function renderLegerPanel(className, cls, students){
  const leger = cls.leger;
  const groupA = students.filter(s=>s.groupe==='A');
  const groupB = students.filter(s=>s.groupe==='B');

  const groupColumn = (groupStudents, groupLabel, otherGroupLabel)=> `
    <h3>Groupe ${groupLabel} <span class="pill" style="margin-left:6px;">${groupStudents.length} élève(s)</span></h3>
    <div class="table-wrap">
    <table class="data-table">
      <thead><tr>
        <th style="background:${HEADER_COLORS[0]}">Nom Prénom</th>
        <th style="background:${HEADER_COLORS[2]}">Sexe</th>
        <th style="background:${HEADER_COLORS[4]}">Absent</th>
        <th style="background:${HEADER_COLORS[3]}"></th>
      </tr></thead>
      <tbody>
      ${groupStudents.map(s=>`
        <tr>
          <td>${escapeHtml(fullName(s))}</td>
          <td>${s.sexe==='F'?'Fille':'Garçon'}</td>
          <td><input type="checkbox" class="leger-absent" data-class="${escapeAttr(className)}" data-student="${s.id}" ${s.results.leger && s.results.leger.absent ? 'checked':''} ${leger.running?'disabled':''}></td>
          <td><button class="small-btn btn-soft group-move-btn" data-class="${escapeAttr(className)}" data-student="${s.id}" data-group="${otherGroupLabel}" ${leger.running?'disabled':''}>→ ${otherGroupLabel}</button></td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>`;

  const compoTable = `
    <div class="grid-2">
      <div>${groupColumn(groupA, 'A', 'B')}</div>
      <div>${groupColumn(groupB, 'B', 'A')}</div>
    </div>`;

  let controls = '';
  if(!leger.running){
    controls = `
    <div class="inline-form">
      <label>Groupe qui commence :
        <select id="startingGroupSelect" data-class="${escapeAttr(className)}">
          <option value="A" ${leger.startingGroup==='A'?'selected':''}>Groupe A</option>
          <option value="B" ${leger.startingGroup==='B'?'selected':''}>Groupe B</option>
        </select>
      </label>
      <button class="btn btn-accent" id="btnStartLeger" data-class="${escapeAttr(className)}">▶️ Lancer le départ commun</button>
    </div>`;
  }

  let liveZone = '';
  if(leger.running || leger.elapsedFrozen>0){
    const elapsed = leger.running ? getLegerElapsed(leger) : leger.elapsedFrozen;
    const seg = getLegerSegment(elapsed);

    liveZone = `
    <div class="timer-box" id="legerTimerBox">
      <div class="time" id="legerTimeDisplay">${fmtMMSS(elapsed)}</div>
      <div class="sub">Groupe actif : ${leger.activeGroup} — Palier ${seg.palier} — ${seg.vitesse.toFixed(1)} km/h</div>
    </div>
    <div class="inline-form">
      ${leger.running ? `<button class="btn btn-outline" style="color:#1e293b;background:#e2e8f0;" id="btnStopLeger" data-class="${escapeAttr(className)}">⏸️ Arrêter le test</button>` : ''}
    </div>
    <h3 style="margin-top:16px;">Élèves du groupe ${leger.activeGroup} — cliquer pour enregistrer l'arrêt</h3>
    <div class="student-grid">
      ${students.filter(s=>s.groupe===leger.activeGroup).map(s=>{
        const r = s.results.leger;
        if(r && r.absent){
          return `<div class="student-tile finished">${escapeHtml(fullName(s))}<span class="res">Absent</span></div>`;
        }
        if(r && r.done){
          return `<div class="student-tile finished">${escapeHtml(fullName(s))}<span class="res">Palier ${r.palier} · ${r.vitesse.toFixed(1)}km/h · ${fmtMMSS(r.temps)}</span></div>`;
        }
        return `<button class="student-tile leger-stop-btn" data-class="${escapeAttr(className)}" data-student="${s.id}">${escapeHtml(fullName(s))}</button>`;
      }).join('')}
    </div>`;
  }

  const groupDone = (g)=> students.filter(s=>s.groupe===g).every(s=> s.results.leger && (s.results.leger.absent || s.results.leger.done));
  let nextGroupBtn = '';
  if(!leger.running && leger.activeGroup && groupDone(leger.activeGroup)){
    const remainingGroup = leger.activeGroup==='A' ? 'B' : 'A';
    if(!groupDone(remainingGroup)){
      nextGroupBtn = `<div class="inline-form"><button class="btn btn-accent" id="btnStartOtherGroup" data-class="${escapeAttr(className)}" data-group="${remainingGroup}">▶️ Lancer le groupe ${remainingGroup}</button></div>`;
    }
  }

  return `<div class="grid-2">
    <div>${compoTable}</div>
    <div>${controls}${nextGroupBtn}${liveZone}</div>
  </div>`;
}

function getLegerElapsed(leger){
  return (Date.now() - leger.startTime)/1000 + (leger.elapsedBeforePause||0);
}

function startLegerGroup(className, group){
  const cls = state.classes[className];
  const leger = cls.leger;
  leger.activeGroup = group;
  leger.running = true;
  leger.startTime = Date.now();
  leger.elapsedBeforePause = 0;
  leger.elapsedFrozen = 0;
  const audio = document.getElementById('legerAudio');
  audio.currentTime = 0;
  audio.play().catch(()=>{});
  saveState();
  renderAll();
  legerTimerHandle = setInterval(()=>{
    const box = document.getElementById('legerTimeDisplay');
    if(box){
      const elapsed = getLegerElapsed(leger);
      const seg = getLegerSegment(elapsed);
      box.textContent = fmtMMSS(elapsed);
      const sub = document.querySelector('#legerTimerBox .sub');
      if(sub) sub.textContent = `Groupe actif : ${leger.activeGroup} — Palier ${seg.palier} — ${seg.vitesse.toFixed(1)} km/h`;
    }
  }, 500);
}

function stopLegerRun(className){
  const cls = state.classes[className];
  const leger = cls.leger;
  if(legerTimerHandle){ clearInterval(legerTimerHandle); legerTimerHandle = null; }
  if(leger.running){
    leger.elapsedFrozen = getLegerElapsed(leger);
  }
  leger.running = false;
  const audio = document.getElementById('legerAudio');
  audio.pause();
  saveState();
  renderAll();
}

function recordLegerResult(className, studentId){
  const cls = state.classes[className];
  const leger = cls.leger;
  const student = cls.students.find(s=>s.id===studentId);
  if(!student) return;
  const elapsed = leger.running ? getLegerElapsed(leger) : leger.elapsedFrozen;
  const {palier, vitesse} = computeLegerResult(elapsed);
  student.results.leger = {palier, vitesse, temps: elapsed, done:true, absent:false};
  saveState();

  // Vérifie si tous les élèves actifs du groupe ont terminé -> stoppe la bande son
  const groupStudents = cls.students.filter(s=>s.groupe===leger.activeGroup);
  const allDone = groupStudents.every(s=> s.results.leger && (s.results.leger.absent || s.results.leger.done));
  if(allDone){
    stopLegerRun(className);
  }else{
    renderAll();
  }
}

/* ==================== ONGLET RESULTATS ==================== */
function computeStats(students){
  const tests = {leger:{}, longueur:{}, vitesse:{}};
  ['A','F','S'].forEach(lvl=>{
    tests.leger[lvl] = {G:0,F:0};
    tests.longueur[lvl] = {G:0,F:0};
    tests.vitesse[lvl] = {G:0,F:0};
  });
  students.forEach(s=>{
    if(s.results.leger && !s.results.leger.absent){
      tests.leger[niveauLeger(s.results.leger.palier)][s.sexe]++;
    }
    if(s.results.longueur && !s.results.longueur.absent){
      tests.longueur[niveauLongueur(s.results.longueur.distance)][s.sexe]++;
    }
    if(s.results.vitesse && !s.results.vitesse.absent){
      tests.vitesse[niveauVitesse(s.results.vitesse.temps)][s.sexe]++;
    }
  });
  return tests;
}

/* ---- Classements (rangs affichés en ligne dans le tableau principal) ---- */
function ordinal(n){ return n===1 ? '1er' : n+'e'; }
function sexLabelPlural(sexe){ return sexe==='F' ? 'filles' : 'garçons'; }
function buildRankInfo(rankedArray){
  const general = new Map();
  rankedArray.forEach((s,i)=> general.set(s.id, i+1));
  const bySex = new Map();
  ['F','G'].forEach(sx=>{
    rankedArray.filter(s=>s.sexe===sx).forEach((s,i)=> bySex.set(s.id, i+1));
  });
  return {general, bySex};
}
function rankSuffix(rankInfo, s){
  const g = rankInfo.general.get(s.id);
  const sx = rankInfo.bySex.get(s.id);
  if(!g) return '';
  return ` <span class="muted" style="white-space:nowrap;font-size:.72rem;">(${ordinal(g)} général · ${ordinal(sx)} ${sexLabelPlural(s.sexe)})</span>`;
}

function statTable(title, data){
  const rowFor = (lvl)=>{
    const g = data[lvl].G, f = data[lvl].F;
    return `<tr><td><span class="badge badge-${lvl}">${LEVEL_LABEL[lvl]}</span></td><td>${g}</td><td>${f}</td><td>${g+f}</td></tr>`;
  };
  return `
  <div>
    <h3>${title}</h3>
    <div class="table-wrap">
    <table class="data-table">
      <thead><tr>
        <th style="background:${HEADER_COLORS[5]}">Niveau</th>
        <th style="background:${HEADER_COLORS[6]}">Garçons</th>
        <th style="background:${HEADER_COLORS[7]}">Filles</th>
        <th style="background:${HEADER_COLORS[0]}">Total</th>
      </tr></thead>
      <tbody>${rowFor('A')}${rowFor('F')}${rowFor('S')}</tbody>
    </table>
    </div>
  </div>`;
}

function sortComparator(col){
  const dir = sortState.dir;
  return (a,b)=>{
    let av, bv;
    switch(col){
      case 'nomPrenom': av=normalize(a.nom)+normalize(a.prenom); bv=normalize(b.nom)+normalize(b.prenom); break;
      case 'classe': av=normalize(a.classe); bv=normalize(b.classe); break;
      case 'sexe': av=a.sexe; bv=b.sexe; break;
      case 'leger': av = a.results.leger && !a.results.leger.absent ? a.results.leger.palier : -1;
                    bv = b.results.leger && !b.results.leger.absent ? b.results.leger.palier : -1; break;
      case 'longueur': av = a.results.longueur && !a.results.longueur.absent ? a.results.longueur.distance : -1;
                        bv = b.results.longueur && !b.results.longueur.absent ? b.results.longueur.distance : -1; break;
      case 'vitesse': av = a.results.vitesse && !a.results.vitesse.absent ? -a.results.vitesse.temps : -9999;
                       bv = b.results.vitesse && !b.results.vitesse.absent ? -b.results.vitesse.temps : -9999; break;
      default: av=''; bv='';
    }
    if(av<bv) return -1*dir;
    if(av>bv) return 1*dir;
    return 0;
  };
}

function renderResultsTab(){
  const baseStudents = resultsClassFilter==='all' ? allStudentsFlat() : allStudentsFlat().filter(s=>s.classe===resultsClassFilter);
  const students = [...baseStudents].sort(sortComparator(sortState.col));
  const stats = computeStats(baseStudents);

  const classFilterOptions = `<option value="all" ${resultsClassFilter==='all'?'selected':''}>Toutes les classes</option>` +
    state.classOrder.map(cn=>`<option value="${escapeAttr(cn)}" ${resultsClassFilter===cn?'selected':''}>${escapeHtml(cn)}</option>`).join('');

  const cols = [
    {key:'nomPrenom', label:'Nom Prénom'},
    {key:'classe', label:'Classe'},
    {key:'sexe', label:'Sexe'},
    {key:'leger', label:'Luc Léger'},
    {key:'longueur', label:'Longueur'},
    {key:'vitesse', label:'Vitesse'}
  ];

  const legerRanking = baseStudents.filter(s=>s.results.leger && !s.results.leger.absent)
    .sort((a,b)=> b.results.leger.palier - a.results.leger.palier || b.results.leger.vitesse - a.results.leger.vitesse);
  const longueurRanking = baseStudents.filter(s=>s.results.longueur && !s.results.longueur.absent)
    .sort((a,b)=> b.results.longueur.distance - a.results.longueur.distance);
  const vitesseRanking = baseStudents.filter(s=>s.results.vitesse && !s.results.vitesse.absent)
    .sort((a,b)=> a.results.vitesse.temps - b.results.vitesse.temps);
  const legerRanks = buildRankInfo(legerRanking);
  const longueurRanks = buildRankInfo(longueurRanking);
  const vitesseRanks = buildRankInfo(vitesseRanking);

  const rows = students.map(s=>{
    const l = s.results.leger, j = s.results.longueur, v = s.results.vitesse;
    const legerCell = !l ? '<span class="muted">—</span>' : l.absent ? '<span class="badge badge-abs">Absent</span>' :
      `Palier ${l.palier} · ${l.vitesse.toFixed(1)}km/h <span class="badge badge-${niveauLeger(l.palier)}">${LEVEL_LABEL[niveauLeger(l.palier)]}</span>${rankSuffix(legerRanks, s)}`;
    const longCell = !j ? '<span class="muted">—</span>' : j.absent ? '<span class="badge badge-abs">Absent</span>' :
      `${j.distance} cm <span class="badge badge-${niveauLongueur(j.distance)}">${LEVEL_LABEL[niveauLongueur(j.distance)]}</span>${rankSuffix(longueurRanks, s)}`;
    const vitCell = !v ? '<span class="muted">—</span>' : v.absent ? '<span class="badge badge-abs">Absent</span>' :
      `${v.temps.toFixed(2)} s <span class="badge badge-${niveauVitesse(v.temps)}">${LEVEL_LABEL[niveauVitesse(v.temps)]}</span>${rankSuffix(vitesseRanks, s)}`;
    return `<tr>
      <td>${escapeHtml(fullName(s))}</td><td>${escapeHtml(s.classe)}</td>
      <td>${s.sexe==='F'?'Fille':'Garçon'}</td>
      <td>${legerCell}</td><td>${longCell}</td><td>${vitCell}</td>
    </tr>`;
  }).join('');

  const thead = cols.map((c,i)=>{
    const arrow = sortState.col===c.key ? (sortState.dir===1?' ▲':' ▼') : '';
    return `<th class="sortable" data-sort="${c.key}" style="background:${HEADER_COLORS[i%HEADER_COLORS.length]}">${c.label}${arrow}</th>`;
  }).join('');

  return `
  <div class="card">
    <h2>📊 Résultats${resultsClassFilter==='all' ? ' — toutes classes' : ' — '+escapeHtml(resultsClassFilter)}</h2>
    <div class="pill-row">
      <label>Filtrer par classe :
        <select id="resultsClassFilterSelect">${classFilterOptions}</select>
      </label>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr>${thead}</tr></thead>
        <tbody>${rows || '<tr><td colspan="6" class="muted">Aucun résultat enregistré.</td></tr>'}</tbody>
      </table>
    </div>
  </div>
  <div class="card">
    <h2>Statistiques</h2>
    <div class="grid-2">
      ${statTable('🏃 Luc Léger', stats.leger)}
      ${statTable('🦘 Longueur', stats.longueur)}
    </div>
    <div style="margin-top:16px;">
      ${statTable('⚡ Vitesse 30m', stats.vitesse)}
    </div>
  </div>`;
}

/* ==================== HANDLERS DYNAMIQUES ==================== */
function attachDynamicHandlers(){
  // Import par onglet de classe (réimport ciblé)
  document.querySelectorAll('.class-import-btn').forEach(el=>{
    el.addEventListener('click', ()=>{
      const input = el.parentElement.querySelector('.class-import-input');
      input.click();
    });
  });
  document.querySelectorAll('.class-import-input').forEach(el=>{
    el.addEventListener('change', (e)=> handleClassImportFile(e, el.dataset.class));
  });

  // Sélection du test
  document.querySelectorAll('.test-radio').forEach(el=>{
    el.addEventListener('change', ()=>{
      const cls = state.classes[el.dataset.class];
      cls.selectedTest = el.value;
      saveState();
      renderAll();
    });
  });

  // Groupes (Léger)
  document.querySelectorAll('.group-move-btn').forEach(el=>{
    el.addEventListener('click', ()=>{
      const cls = state.classes[el.dataset.class];
      const s = cls.students.find(x=>x.id===el.dataset.student);
      s.groupe = el.dataset.group;
      saveState();
      renderAll();
    });
  });
  document.querySelectorAll('.leger-absent').forEach(el=>{
    el.addEventListener('change', ()=>{
      const cls = state.classes[el.dataset.class];
      const s = cls.students.find(x=>x.id===el.dataset.student);
      if(el.checked) s.results.leger = {absent:true};
      else delete s.results.leger;
      saveState();
      renderAll();
    });
  });

  const startingSel = document.getElementById('startingGroupSelect');
  if(startingSel){
    startingSel.addEventListener('change', ()=>{
      state.classes[startingSel.dataset.class].leger.startingGroup = startingSel.value;
      saveState();
    });
  }

  const btnStartLeger = document.getElementById('btnStartLeger');
  if(btnStartLeger){
    btnStartLeger.addEventListener('click', ()=>{
      const cls = state.classes[btnStartLeger.dataset.class];
      startLegerGroup(btnStartLeger.dataset.class, cls.leger.startingGroup);
    });
  }
  const btnStartOther = document.getElementById('btnStartOtherGroup');
  if(btnStartOther){
    btnStartOther.addEventListener('click', ()=>{
      startLegerGroup(btnStartOther.dataset.class, btnStartOther.dataset.group);
    });
  }
  const btnStopLeger = document.getElementById('btnStopLeger');
  if(btnStopLeger){
    btnStopLeger.addEventListener('click', ()=> stopLegerRun(btnStopLeger.dataset.class));
  }
  document.querySelectorAll('.leger-stop-btn').forEach(el=>{
    el.addEventListener('click', ()=> recordLegerResult(el.dataset.class, el.dataset.student));
  });

  // Longueur
  const btnValidLongueur = document.getElementById('btnValidLongueur');
  if(btnValidLongueur){
    btnValidLongueur.addEventListener('click', ()=>{
      const input = document.getElementById('longueurInput');
      recordResult(btnValidLongueur.dataset.class, 'longueur', btnValidLongueur.dataset.student, input.value);
    });
  }
  const longueurInput = document.getElementById('longueurInput');
  if(longueurInput){
    longueurInput.addEventListener('keydown', (ev)=>{
      if(ev.key==='Enter'){
        ev.preventDefault();
        document.getElementById('btnValidLongueur').click();
      }
    });
    longueurInput.focus();
  }
  const btnAbsentLongueur = document.getElementById('btnAbsentLongueur');
  if(btnAbsentLongueur){
    btnAbsentLongueur.addEventListener('click', ()=>{
      const cls = state.classes[btnAbsentLongueur.dataset.class];
      const s = cls.students.find(x=>x.id===btnAbsentLongueur.dataset.student);
      s.results.longueur = {absent:true};
      cls.longueur.selectedId = null;
      saveState();
      renderAll();
    });
  }

  // Vitesse
  const btnStartVitesse = document.getElementById('btnStartVitesse');
  if(btnStartVitesse){
    btnStartVitesse.addEventListener('click', ()=>{
      const cls = state.classes[btnStartVitesse.dataset.class];
      cls.vitesse.running = true;
      cls.vitesse.startTime = Date.now();
      renderAll();
      const display = document.getElementById('vitesseTimeDisplay');
      vitesseTimerHandle = setInterval(()=>{
        if(display) display.textContent = ((Date.now()-cls.vitesse.startTime)/1000).toFixed(2)+' s';
      }, 40);
    });
  }
  const btnStopVitesse = document.getElementById('btnStopVitesse');
  if(btnStopVitesse){
    btnStopVitesse.addEventListener('click', ()=>{
      const cls = state.classes[btnStopVitesse.dataset.class];
      const elapsed = (Date.now()-cls.vitesse.startTime)/1000;
      if(vitesseTimerHandle){ clearInterval(vitesseTimerHandle); vitesseTimerHandle=null; }
      cls.vitesse.running = false;
      const s = cls.students.find(x=>x.id===btnStopVitesse.dataset.student);
      s.results.vitesse = {temps: elapsed, absent:false};
      cls.vitesse.selectedId = null;
      saveState();
      renderAll();
    });
  }
  const btnAbsentVitesse = document.getElementById('btnAbsentVitesse');
  if(btnAbsentVitesse){
    btnAbsentVitesse.addEventListener('click', ()=>{
      const cls = state.classes[btnAbsentVitesse.dataset.class];
      const s = cls.students.find(x=>x.id===btnAbsentVitesse.dataset.student);
      s.results.vitesse = {absent:true};
      cls.vitesse.selectedId = null;
      saveState();
      renderAll();
    });
  }
  const btnSaveVitesseEdit = document.getElementById('btnSaveVitesseEdit');
  if(btnSaveVitesseEdit){
    btnSaveVitesseEdit.addEventListener('click', ()=>{
      const input = document.getElementById('vitesseEditInput');
      recordResult(btnSaveVitesseEdit.dataset.class, 'vitesse', btnSaveVitesseEdit.dataset.student, input.value);
    });
  }

  // Clic direct sur un élève dans la liste (longueur / vitesse) :
  // l'encadré de gauche affiche sa saisie (nouvelle performance ou modification si déjà enregistré)
  document.querySelectorAll('.pickable-row').forEach(el=>{
    el.addEventListener('click', ()=>{
      const cls = state.classes[el.dataset.class];
      cls[el.dataset.test].selectedId = el.dataset.student;
      saveState();
      renderAll();
    });
  });

  // Filtre par classe (onglet Résultats)
  const resultsFilterSel = document.getElementById('resultsClassFilterSelect');
  if(resultsFilterSel){
    resultsFilterSel.addEventListener('change', ()=>{
      resultsClassFilter = resultsFilterSel.value;
      renderAll();
    });
  }

  // Tri du tableau résultats
  document.querySelectorAll('th.sortable').forEach(th=>{
    th.addEventListener('click', ()=>{
      const col = th.dataset.sort;
      if(sortState.col === col) sortState.dir *= -1;
      else { sortState.col = col; sortState.dir = 1; }
      renderAll();
    });
  });

}

/* Enregistre une valeur numérique (distance ou temps) pour un élève, depuis
   l'encadré de saisie, puis relâche la sélection pour revenir à l'élève suivant. */
function recordResult(className, test, studentId, rawValue){
  const val = parseFloat(rawValue);
  if(isNaN(val)){ alert('Merci de saisir une valeur valide.'); return; }
  const cls = state.classes[className];
  const s = cls.students.find(x=>x.id===studentId);
  if(test==='longueur') s.results.longueur = {distance: val, absent:false};
  else s.results.vitesse = {temps: val, absent:false};
  cls[test].selectedId = null;
  saveState();
  renderAll();
}

/* ==================== INIT ==================== */
(function populateImportClassSelect(){
  const selectEl = document.getElementById('importClassSelect');
  AVAILABLE_CLASSES.forEach(c=>{
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    selectEl.appendChild(opt);
  });
})();
loadState();
if(!state.activeTab) state.activeTab = 'general';
renderAll();
</script>
